<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- Makes the page render correctly on mobile devices -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Expense Tracker</title>
        <link rel="stylesheet" href="styles.css">

        <!-- Google Fonts: Figtree -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- Page title -->
        <header>
            <h1>Expense Tracker</h1>
        </header>

        <main>
            <!-- ============================================
                 Expense log: filter/sort controls and the
                 table of expenses
                 ============================================ -->
            <section id="log">
                <h2>Expenses</h2>

                <!-- Controls for filtering and sorting the table below -->
                <div class="controls">
                    <p>
                        <label for="category-filter">Filter by category:</label>
                        <!-- Changing this re-renders the table to show
                             only expenses in the selected category -->
                        <select id="category-filter">
                            <option value="All">All</option>
                            <option value="Food">Food</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Housing">Housing</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Misc.">Misc.</option>
                        </select>
                    </p>

                    <p>
                        <label for="sort-by">Sort by:</label>
                        <!-- Changing this re-renders the table in the
                             chosen order -->
                        <select id="sort-by">
                            <option value="date-desc">Date (newest first)</option>
                            <option value="date-asc">Date (oldest first)</option>
                            <option value="amount-desc">Amount (highest first)</option>
                            <option value="amount-asc">Amount (lowest first)</option>
                        </select>
                    </p>
                </div>

                <!-- Table of expenses. Only the header row is hardcoded;
                     the body rows are generated by script.js -->
                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <!-- script.js fills this in with one <tr> per expense -->
                    <tbody id="expense-list"></tbody>
                </table>

                <!-- Hidden by default. script.js shows this message
                     instead of the table when there's nothing to display -->
                <p id="empty-message" hidden>
                    No expenses yet. Add one using the form below.
                </p>
            </section>

            <!-- ============================================
                 Totals: overall total, EUR conversion, and
                 a breakdown of spending by category
                 ============================================ -->
            <section id="stats">
                <h2>Totals</h2>

                <!-- Updated by script.js to show how many expenses
                     are currently visible -->
                <p>Number of expenses:</p>
                <p id="expense-count">0</p>

                <!-- Updated by script.js with the sum of all visible expenses -->
                <p>Overall total:</p>
                <p id="overall-total">$0.00</p>

                <!-- Clicking this fetches the current USD-to-EUR rate
                     and shows the converted total below -->
                <button id="convert-btn" type="button">Convert to EUR</button>
                <p id="convert-result"></p>

                <!-- script.js fills this in with one <li> per category total -->
                <h3>By category</h3>
                <ul id="category-totals"></ul>
            </section>

            <!-- ============================================
                 Form for adding a new expense
                 ============================================ -->
            <section id="form">
                <h2>Add an Expense</h2>

                <!-- script.js listens for the "submit" event on this
                     form, validates the inputs, and adds a new expense -->
                <form id="expense-form">
                    <p>
                        <label for="description">Description:</label>
                        <input type="text" id="description" name="description" required>
                    </p>

                    <p>
                        <label for="amount">Amount ($):</label>
                        <!-- min and step reinforce the JS validation at the HTML level -->
                        <input type="number" id="amount" name="amount"
                               min="0.01" step="0.01" required>
                    </p>

                    <p>
                        <label for="category">Category:</label>
                        <select id="category" name="category">
                            <option value="Food">Food</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Housing">Housing</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Misc.">Misc.</option>
                        </select>
                    </p>

                    <p>
                        <!-- script.js sets this to today's date when the
                             page loads and after each new expense is added -->
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                    </p>

                    <!-- Hidden by default. script.js shows an error message
                         here if the form is submitted with invalid input -->
                    <p id="form-error" hidden></p>

                    <button type="submit">Add Expense</button>
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Oluwafemi Olosunde</p>
        </footer>

        <!-- Placed at the end of <body> so the elements above already
             exist by the time this script runs -->
        <script src="script.js"></script>
    </body>
</html>
