<!DOCTYPE html>
<htm lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Expense Tracker</title>
        <link rel="stylesheet" href="styles.css">
        <script src="script.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" 
              crossorigin>
        <link href="https://fonts.googleapis.com/css2
              ?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" 
              rel="stylesheet">
    </head>
    <body>
        <header>
            <h1>Expense Tracker</h1>
        </header>
        <main>
            <section class="grid" id="log">
                <table>
                    <!--Insert Table of Elements Here-->
                </table>
            </section>
            <section class="grid" id="stats">
                <!--Insert the running total here-->
            </section>
            <section class="grid" id="form">
                <form>
                    <p>
                        <label for="description">Description:</label>
                        <input type="text" id="description" name="description" required>
                    </p>

                    <p>
                        <label for="amount">Amount ($):</label>
                        <input type="number" id="amount" name="amount" required>
                    </p>

                    <p>
                        <label for="category">Category:</label>
                        <select id="category" name="category">
                            <option value="food">Food</option>
                            <option value="transportation">Transportation</option>
                            <option value="housing">Housing</option>
                            <option value="entertainment">Entertainment</option>
                            <option value="miscellaneous">Misc.</option>
                        </select>
                    </p>

                    <p>
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                    </p>
                </form>
            </section>
        </main>
        <footer>
            <!--Just add a copyright potentially-->
        </footer>
    </body>
</html>
